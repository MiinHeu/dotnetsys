<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hệ thống quản lý Phố Ẩm Thực Vĩnh Khánh — Quận 4, TP. Hồ Chí Minh" />
    <title>Phố Ẩm Thực Vĩnh Khánh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Sync OS dark mode preference → .dark class for Tailwind
      (function(){
        const m = window.matchMedia('(prefers-color-scheme: dark)');
        function s(e){ document.documentElement.classList.toggle('dark', e.matches); }
        s(m); m.addEventListener('change', s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
